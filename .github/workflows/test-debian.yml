name: test debian

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/test-debian.yml'
      - '.github/workflows/shellcheck.yml'
      - '.github/workflows/vpn_test.yml'

jobs:
  shellcheck:
    if: github.repository_owner == 'hwdsl2'
    uses: ./.github/workflows/shellcheck.yml

  vpn_test:
    if: github.repository_owner == 'hwdsl2'
    uses: ./.github/workflows/vpn_test.yml
    with:
      os_type: debian
